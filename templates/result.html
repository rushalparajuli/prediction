<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Churn Prediction Result</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        flex-direction: column;
      }

      .result-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        text-align: center;
      }

      .churn {
        color: red;
        font-size: 28px;
        font-weight: bold;
      }
      .not-churn {
        color: green;
        font-size: 28px;
        font-weight: bold;
      }

      .back-button {
        margin-top: 20px;
        padding: 10px 20px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .back-button:hover {
        background: #0056b3;
      }

      .topic {
        font-size: 50px;
        font-weight: bold;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="topic">Churn Prediction System</div>
    <div class="result-container">
      <h2>Customer Churn Prediction Result</h2>
      <p id="prediction-result" class="churn"></p>
      <a href="/" class="back-button">Go Back</a>
    </div>
    <!-- Previous HTML remains the same -->
    <script>
      async function getPrediction() {
        try {
          const response = await fetch("/get_prediction", {
            credentials: "include", // Ensures session cookies are included
          });

          const data = await response.json();
          const resultElement = document.getElementById("prediction-result");

          if (data.prediction) {
            resultElement.textContent = data.prediction;

            // Apply text color based on prediction
            if (data.prediction.toLowerCase() === "churn") {
              resultElement.style.color = "red"; // Red for churn
            } else {
              resultElement.style.color = "green"; // Green for not churn
            }
          }
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("prediction-result").textContent =
            "Error fetching prediction.";
        }
      }

      getPrediction();
    </script>
  </body>
</html>
