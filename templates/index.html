<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Churn Prediction</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        height: 100vh;
      }
      .container {
        background: white;
        font-size: x-large;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        width: 85%;
        max-width: 1100px;
      }
      h2 {
        color: #333;
        margin-bottom: 20px;
        text-align: center;
        font-size: 2.5rem;
        letter-spacing: 1px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .form-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 25px;
        margin-bottom: 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        font-weight: 800;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
        color: #555;
      }
      input,
      select,
      button {
        margin: 10px 0;
        padding: 14px;
        width: 100%;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 20px;
        box-sizing: border-box;
      }
      select {
        background-color: #fff;
        cursor: pointer;
      }
      input[type="number"] {
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
      }
      button {
        background-color: #28a745;
        color: white;
        font-weight: bold;
        transition: background 0.3s;
        cursor: pointer;
        padding: 16px;
        border-radius: 8px;
        border: none;
      }
      button:hover {
        background-color: #218838;
      }
      .form-container .form-group:nth-child(odd) {
        border-right: 2px solid #f0f0f0;
        padding-right: 15px;
      }
      .form-container .form-group:nth-child(even) {
        padding-left: 15px;
      }
      .form-container .form-group select,
      .form-container .form-group input {
        background-color: #fafafa;
        border: 1px solid #ddd;
      }
      .form-container .form-group input:focus,
      .form-container .form-group select:focus {
        border-color: #28a745;
        outline: none;
      }
      #predictionResult {
        margin-top: 30px;
        font-weight: bold;
        font-size: 2rem;
        text-align: center;
        padding: 40px;
        background-color: #fff;
        border: 2px solid;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        transition: all 0.3s ease;
      }
      #predictionResult.green {
        border-color: #28a745;
        color: #28a745;
      }
      #predictionResult.red {
        border-color: #e74c3c;
        color: #e74c3c;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Customer Churn Prediction</h2>
      <form id="jsonForm">
        <div class="form-container">
          <div class="form-group">
            <label for="CustomerID">Customer ID</label>
            <input
              type="text"
              id="CustomerID"
              placeholder="Customer ID"
              required
            />
          </div>
          <div class="form-group">
            <label for="gender">Gender</label>
            <select id="gender" required>
              <option value="">Select Gender</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
          <div class="form-group">
            <label for="SeniorCitizen">Senior Citizen</label>
            <select id="SeniorCitizen" required>
              <option value="">Select Senior Citizen</option>
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="Partner">Partner</label>
            <select id="Partner" required>
              <option value="">Select Partner</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="Dependents">Dependents</label>
            <select id="Dependents" required>
              <option value="">Select Dependents</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="tenure">Tenure</label>
            <input type="number" id="tenure" placeholder="Tenure" required />
          </div>
          <div class="form-group">
            <label for="PhoneService">Phone Service</label>
            <select id="PhoneService" required>
              <option value="">Select Phone Service</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="MultipleLines">Multiple Lines</label>
            <select id="MultipleLines" required>
              <option value="">Select Multiple Lines</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="InternetService">Internet Service</label>
            <select id="InternetService" required>
              <option value="">Select Internet Service</option>
              <option value="DSL">DSL</option>
              <option value="Fiber optic">Fiber optic</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="OnlineSecurity">Online Security</label>
            <select id="OnlineSecurity" required>
              <option value="">Select Online Security</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
        </div>

        <div class="form-container">
          <div class="form-group">
            <label for="OnlineBackup">Online Backup</label>
            <select id="OnlineBackup" required>
              <option value="">Select Online Backup</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="DeviceProtection">Device Protection</label>
            <select id="DeviceProtection" required>
              <option value="">Select Device Protection</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="TechSupport">Tech Support</label>
            <select id="TechSupport" required>
              <option value="">Select Tech Support</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="StreamingTV">Streaming TV</label>
            <select id="StreamingTV" required>
              <option value="">Select Streaming TV</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="StreamingMovies">Streaming Movies</label>
            <select id="StreamingMovies" required>
              <option value="">Select Streaming Movies</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="Contract">Contract</label>
            <select id="Contract" required>
              <option value="">Select Contract</option>
              <option value="Month-to-month">Month-to-month</option>
              <option value="One year">One year</option>
              <option value="Two year">Two year</option>
            </select>
          </div>
          <div class="form-group">
            <label for="PaperlessBilling">Paperless Billing</label>
            <select id="PaperlessBilling" required>
              <option value="">Select Paperless Billing</option>
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
          <div class="form-group">
            <label for="PaymentMethod">Payment Method</label>
            <select id="PaymentMethod" required>
              <option value="">Select Payment Method</option>
              <option value="Electronic check">Electronic check</option>
              <option value="Mailed check">Mailed check</option>
              <option value="Bank transfer (automatic)">
                Bank transfer (automatic)
              </option>
              <option value="Credit card (automatic)">
                Credit card (automatic)
              </option>
            </select>
          </div>
          <div class="form-group">
            <label for="MonthlyCharges">Monthly Charges</label>
            <input
              type="number"
              step="0.01"
              id="MonthlyCharges"
              placeholder="Monthly Charges"
              required
            />
          </div>
          <div class="form-group">
            <label for="TotalCharges">Total Charges</label>
            <input
              type="number"
              step="0.01"
              id="TotalCharges"
              placeholder="Total Charges"
              required
            />
          </div>
        </div>

        <button type="submit">Predict</button>
      </form>
      <h2>The result of prediction is:</h2>
      <div id="predictionResult"></div>
    </div>

    <script>
      document
        .getElementById("jsonForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          // Map form elements to JSON keys expected by the backend
          const formElements = {
            CustomerID: "CustomerID",
            gender: "gender",
            SeniorCitizen: "SeniorCitizen", // Ensure correct key name
            Partner: "Partner",
            Dependents: "Dependents",
            tenure: "tenure",
            PhoneService: "PhoneService",
            MultipleLines: "MultipleLines",
            InternetService: "InternetService",
            OnlineSecurity: "OnlineSecurity",
            OnlineBackup: "OnlineBackup",
            DeviceProtection: "DeviceProtection",
            TechSupport: "TechSupport",
            StreamingTV: "StreamingTV",
            StreamingMovies: "StreamingMovies",
            Contract: "Contract",
            PaperlessBilling: "PaperlessBilling",
            PaymentMethod: "PaymentMethod",
            MonthlyCharges: "MonthlyCharges",
            TotalCharges: "TotalCharges",
          };

          let jsonData = {};
          for (const [id, key] of Object.entries(formElements)) {
            const element = document.getElementById(id);
            if (element.type === "select-one") {
              jsonData[key] = element.value;
            } else {
              jsonData[key] =
                element.type === "number"
                  ? parseFloat(element.value)
                  : element.value;
            }
            // Handle SeniorCitizen conversion to integer
            if (id === "SeniorCitizen") jsonData[key] = parseInt(jsonData[key]);
          }

          console.log("Sending JSON Data:", jsonData);

          fetch("/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(jsonData),
          })
            .then((response) => response.json())
            .then((data) => {
              const resultBox = document.getElementById("predictionResult");
              resultBox.innerText = data.prediction;

              if (data.prediction === "The customer will churn") {
                resultBox.classList.add("red");
                resultBox.classList.remove("green");
              } else {
                resultBox.classList.add("green");
                resultBox.classList.remove("red");
              }
            })
            .catch((error) => console.error("Error:", error));
        });
    </script>
  </body>
</html>
